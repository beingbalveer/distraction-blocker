<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distraction Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">

    <!-- Header -->
    <div class="popup-header">
      <div class="header-title">
        <span class="header-icon">🛡️</span>
        <h1>Distraction Blocker</h1>
      </div>
      <div class="site-badge" id="site-badge">
        <span class="site-dot"></span>
        <span id="site-name">Detecting…</span>
        <label class="master-switch" id="master-toggle-wrap" title="Toggle all blocking for this site" style="display:none">
          <input type="checkbox" id="master-enabled" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>

    <!-- Section toggles -->
    <div class="toggles-container" id="toggles-container"></div>

    <!-- Unsupported site -->
    <div class="unsupported-message" id="unsupported-message" style="display:none">
      <span class="unsupported-icon">🚫</span>
      <p>This site isn't supported yet.</p>
      <span class="unsupported-hint">Reddit · YouTube · Instagram · Facebook</span>
    </div>

    <!-- Hide / Show all -->
    <div class="popup-footer" id="popup-footer">
      <button class="btn btn-hide-all" id="btn-hide-all">Hide All</button>
      <button class="btn btn-show-all" id="btn-show-all">Show All</button>
    </div>

    <!-- Advanced (per-site) -->
    <div class="advanced-section" id="advanced-section" style="display:none">
      <button class="advanced-toggle-btn" id="advanced-toggle-btn">⚙ Advanced</button>
      <div class="advanced-content" id="advanced-content" style="display:none">
        <div class="advanced-field">
          <label>Custom selectors to hide (one per line)</label>
          <textarea id="custom-selectors" rows="3" placeholder=".ad-banner&#10;#promoted-section"></textarea>
        </div>
        <div class="advanced-field">
          <label>Only block on URLs containing (empty = everywhere)</label>
          <textarea id="url-patterns" rows="2" placeholder="/feed&#10;/home"></textarea>
        </div>
      </div>
    </div>

    <!-- Profiles -->
    <div class="profiles-section">
      <div class="profiles-title"><span>🔖</span><span>Profiles</span></div>
      <div class="profiles-load-row">
        <select id="profiles-select"><option value="">— no saved profiles —</option></select>
        <button class="btn-icon" id="btn-profile-load" title="Load">▶</button>
        <button class="btn-icon btn-icon-danger" id="btn-profile-delete" title="Delete">✕</button>
      </div>
      <div class="profiles-save-row">
        <input type="text" id="profile-name-input" placeholder="New profile name…" maxlength="40">
        <button class="btn-icon btn-icon-accent" id="btn-profile-save">Save</button>
      </div>
    </div>

    <!-- Schedule -->
    <div class="schedule-section">
      <div class="schedule-header">
        <div class="schedule-title"><span>⏰</span><span>Auto-Block Schedule</span></div>
        <label class="toggle-switch">
          <input type="checkbox" id="schedule-enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="schedule-config" id="schedule-config" style="display:none">
        <div class="schedule-days" id="schedule-days"></div>
        <div class="schedule-times">
          <div class="time-group">
            <span>From</span>
            <input type="time" id="schedule-start" value="09:00">
          </div>
          <div class="time-group">
            <span>To</span>
            <input type="time" id="schedule-end" value="17:00">
          </div>
        </div>
        <div class="schedule-status" id="schedule-status"></div>
      </div>
    </div>

    <!-- Import / Export -->
    <div class="importexport-row">
      <button class="btn-icon" id="btn-export">⬇ Export</button>
      <button class="btn-icon btn-icon-accent" id="btn-import">⬆ Import</button>
      <input type="file" id="import-file" accept=".json" style="display:none">
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
