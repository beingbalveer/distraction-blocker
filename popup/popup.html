<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Distraction Blocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <div class="popup-header">
      <div class="header-title">
        <span class="header-icon">🛡️</span>
        <h1>Distraction Blocker</h1>
      </div>
      <div class="site-badge" id="site-badge">
        <span class="site-dot"></span>
        <span id="site-name">Detecting…</span>
      </div>
    </div>

    <!-- Toggles Container -->
    <div class="toggles-container" id="toggles-container">
      <!-- Toggles are dynamically generated -->
    </div>

    <!-- Unsupported Site Message -->
    <div class="unsupported-message" id="unsupported-message" style="display: none;">
      <span class="unsupported-icon">🚫</span>
      <p>This site is not supported yet.</p>
      <span class="unsupported-hint">Supported: Reddit, YouTube, Instagram, Facebook</span>
    </div>

    <!-- Footer -->
    <div class="popup-footer" id="popup-footer">
      <button class="btn btn-hide-all" id="btn-hide-all">Hide All</button>
      <button class="btn btn-show-all" id="btn-show-all">Show All</button>
    </div>

    <!-- Profiles Section (always visible) -->
    <div class="profiles-section">
      <div class="profiles-title">
        <span>🔖</span>
        <span>Profiles</span>
      </div>
      <div class="profiles-load-row">
        <select id="profiles-select">
          <option value="">— no saved profiles —</option>
        </select>
        <button class="btn-icon" id="btn-profile-load" title="Load profile">▶</button>
        <button class="btn-icon btn-icon-danger" id="btn-profile-delete" title="Delete profile">✕</button>
      </div>
      <div class="profiles-save-row">
        <input type="text" id="profile-name-input" placeholder="Profile name…" maxlength="40">
        <button class="btn-icon btn-icon-accent" id="btn-profile-save" title="Save current settings as profile">Save</button>
      </div>
    </div>

    <!-- Schedule Section (always visible) -->
    <div class="schedule-section">
      <div class="schedule-header">
        <div class="schedule-title">
          <span>⏰</span>
          <span>Auto-Block Schedule</span>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="schedule-enabled">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="schedule-config" id="schedule-config">
        <div class="schedule-days" id="schedule-days"></div>
        <div class="schedule-times">
          <div class="time-group">
            <span>From</span>
            <input type="time" id="schedule-start" value="09:00">
          </div>
          <div class="time-group">
            <span>To</span>
            <input type="time" id="schedule-end" value="17:00">
          </div>
        </div>
        <div class="schedule-status" id="schedule-status"></div>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
